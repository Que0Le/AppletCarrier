name: Release build

# Triggers on a release_* tag push (any branch — tags point at commits, not branches), or
# manually from the Actions tab for smoke-testing (workflow_dispatch). A manual run builds
# + zips per OS and uploads the result as a run artifact instead of creating a Release.
on:
  push:
    tags:
      - 'release_*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Test version (used for the file names; no GitHub Release is created)'
        required: false
        default: '0.0.0-test'

permissions:
  contents: write  # needed to create the GitHub Release and upload assets

jobs:
  # ---------------- Windows ----------------
  windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Resolve version
        id: ver
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF_NAME#release_}" >> "$GITHUB_OUTPUT"
          fi

      - name: Run tests and build app image
        run: .\gradlew.bat :shared:jvmTest :desktopApp:createDistributable "-PappVersion=${{ steps.ver.outputs.version }}"

      - name: Zip the app image
        shell: pwsh
        run: Compress-Archive -Path desktopApp/build/compose/binaries/main/app/AppletCarrier -DestinationPath "AppletCarrier-windows-${{ steps.ver.outputs.version }}.zip" -Force

      - name: Publish to GitHub Release
        if: github.event_name == 'push'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" --title "AppletCarrier ${{ steps.ver.outputs.version }}" || true
          gh release upload "$GITHUB_REF_NAME" "AppletCarrier-windows-${{ steps.ver.outputs.version }}.zip" --clobber

      - name: Upload artifact (manual runs)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: AppletCarrier-windows-${{ steps.ver.outputs.version }}
          path: AppletCarrier-windows-${{ steps.ver.outputs.version }}.zip

  # ---------------- macOS (Apple Silicon) ----------------
  macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Resolve version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF_NAME#release_}" >> "$GITHUB_OUTPUT"
          fi

      - name: Run tests and build app image
        run: ./gradlew :shared:jvmTest :desktopApp:createDistributable -PappVersion=${{ steps.ver.outputs.version }}

      - name: Build DMG (optional)
        continue-on-error: true
        run: ./gradlew :desktopApp:packageDmg -PappVersion=${{ steps.ver.outputs.version }}

      - name: Zip the .app bundle
        # ditto preserves bundle symlinks/permissions (plain zip can corrupt .app).
        run: ditto -c -k --keepParent "desktopApp/build/compose/binaries/main/app/AppletCarrier.app" "AppletCarrier-macos-${{ steps.ver.outputs.version }}.zip"

      - name: Publish to GitHub Release
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" --title "AppletCarrier ${{ steps.ver.outputs.version }}" || true
          gh release upload "$GITHUB_REF_NAME" "AppletCarrier-macos-${{ steps.ver.outputs.version }}.zip" --clobber
          DMG="$(ls desktopApp/build/compose/binaries/main/dmg/*.dmg 2>/dev/null | head -n1 || true)"
          if [ -n "$DMG" ]; then gh release upload "$GITHUB_REF_NAME" "$DMG" --clobber; fi

      - name: Upload artifact (manual runs)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: AppletCarrier-macos-${{ steps.ver.outputs.version }}
          path: AppletCarrier-macos-${{ steps.ver.outputs.version }}.zip
