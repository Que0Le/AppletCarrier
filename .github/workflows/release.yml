name: Release build

# Triggers on a release_* tag push (on any branch — tags point at commits, not branches),
# or manually from the Actions tab for smoke-testing (workflow_dispatch). A manual run
# builds + zips but uploads the zip as a run artifact instead of creating a Release.
on:
  push:
    tags:
      - 'release_*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Test version (used for the zip name; no GitHub Release is created)'
        required: false
        default: '0.0.0-test'

permissions:
  contents: write  # needed to create the GitHub Release and upload the asset

jobs:
  build:
    runs-on: windows-latest  # jpackage builds for the host OS → Windows for the .exe image

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin   # includes jpackage
          java-version: '21'
          cache: gradle

      - name: Resolve version
        id: ver
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF_NAME#release_}" >> "$GITHUB_OUTPUT"
          fi

      - name: Run tests and build app image
        run: .\gradlew.bat :shared:jvmTest :desktopApp:createDistributable "-PappVersion=${{ steps.ver.outputs.version }}"

      - name: Zip the app image folder
        shell: pwsh
        run: |
          $src = "desktopApp/build/compose/binaries/main/app/AppletCarrier"
          Compress-Archive -Path $src -DestinationPath "AppletCarrier-${{ steps.ver.outputs.version }}.zip" -Force

      # Real release: only on a release_* tag push.
      - name: Publish GitHub Release
        if: github.event_name == 'push'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$env:GITHUB_REF_NAME" "AppletCarrier-${{ steps.ver.outputs.version }}.zip" --title "AppletCarrier ${{ steps.ver.outputs.version }}"

      # Smoke test: manual run uploads the zip as a downloadable run artifact instead.
      - name: Upload zip as artifact (manual runs)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: AppletCarrier-${{ steps.ver.outputs.version }}
          path: AppletCarrier-${{ steps.ver.outputs.version }}.zip
